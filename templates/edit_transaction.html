{% extends "base.html" %}

{% block content %}
<section class="form-section">
    <h1>Editar transação</h1>

    <form class="form-card" method="POST">
        <label for="title">Título</label>
        <input type="text" id="title" name="title" value="{{ transaction.title }}">

        <label for="amount">Valor</label>
        <input type="number" step="0.01" id="amount" name="amount" value="{{ transaction.amount }}">

        <label for="type">Tipo</label>
        <select id="type" name="type">
            <option value="">Selecione</option>
            <option value="receita" {% if transaction.type == "receita" %}selected{% endif %}>Receita</option>
            <option value="despesa" {% if transaction.type == "despesa" %}selected{% endif %}>Despesa</option>
        </select>

        <label for="category">Categoria</label>
        <select id="category" name="category">
            <option value="">Selecione uma categoria</option>
            <option value="Alimentação" {% if transaction.category == "Alimentação" %}selected{% endif %}>Alimentação</option>
            <option value="Transporte" {% if transaction.category == "Transporte" %}selected{% endif %}>Transporte</option>
            <option value="Moradia" {% if transaction.category == "Moradia" %}selected{% endif %}>Moradia</option>
            <option value="Saúde" {% if transaction.category == "Saúde" %}selected{% endif %}>Saúde</option>
            <option value="Educação" {% if transaction.category == "Educação" %}selected{% endif %}>Educação</option>
            <option value="Lazer" {% if transaction.category == "Lazer" %}selected{% endif %}>Lazer</option>
            <option value="Salário" {% if transaction.category == "Salário" %}selected{% endif %}>Salário</option>
            <option value="Freelance" {% if transaction.category == "Freelance" %}selected{% endif %}>Freelance</option>
            <option value="Outros" {% if transaction.category == "Outros" %}selected{% endif %}>Outros</option>
        </select>

        <label for="recurrence">Recorrência</label>
        <select id="recurrence" name="recurrence">
            <option value="">Selecione</option>
            <option value="unique" {% if not transaction.is_recurring %}selected{% endif %}>Única</option>
            <option value="monthly" {% if transaction.recurrence_type == "monthly" %}selected{% endif %}>Mensal</option>
        </select>

        <label for="date">Data</label>
        <input type="date" id="date" name="date" value="{{ transaction.date.strftime('%Y-%m-%d') }}">

        <label for="description">Descrição</label>
        <textarea id="description" name="description" rows="4">{{ transaction.description if transaction.description else "" }}</textarea>

        <button type="submit" class="btn">Salvar alterações</button>
    </form>
</section>
{% endblock %}
