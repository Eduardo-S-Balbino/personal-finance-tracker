{% extends "base.html" %}

{% block content %}
<section class="form-section">
    <h1>Adicionar transação</h1>

    <form class="form-card" method="POST">
        <label for="title">Título</label>
        <input type="text" id="title" name="title" placeholder="Ex: Salário, Mercado, Internet">

        <label for="amount">Valor</label>
        <input type="number" step="0.01" id="amount" name="amount" placeholder="Ex: 150.00">

        <label for="type">Tipo</label>
        <select id="type" name="type">
            <option value="">Selecione</option>
            <option value="receita">Receita</option>
            <option value="despesa">Despesa</option>
        </select>

        <label for="category">Categoria</label>
        <select id="category" name="category">
            <option value="">Selecione uma categoria</option>
            <option value="Alimentação">Alimentação</option>
            <option value="Transporte">Transporte</option>
            <option value="Moradia">Moradia</option>
            <option value="Saúde">Saúde</option>
            <option value="Educação">Educação</option>
            <option value="Lazer">Lazer</option>
            <option value="Salário">Salário</option>
            <option value="Freelance">Freelance</option>
            <option value="Outros">Outros</option>
        </select>

        <label for="recurrence">Recorrência</label>
        <select id="recurrence" name="recurrence">
            <option value="">Selecione</option>
            <option value="unique">Única</option>
            <option value="monthly">Mensal</option>
        </select>

        <label for="date">Data</label>
        <input type="date" id="date" name="date">

        <label for="description">Descrição</label>
        <textarea id="description" name="description" rows="4" placeholder="Observação opcional"></textarea>

        <button type="submit" class="btn">Salvar transação</button>
    </form>
</section>
{% endblock %}
