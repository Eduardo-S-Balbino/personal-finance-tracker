{% extends "base.html" %}

{% block content %}
<section class="form-section">
    <h1>Adicionar transação</h1>
    <p class="section-description">Preencha os dados abaixo para registrar uma nova movimentação financeira.</p>

    <form class="form-card" method="POST">
        <label for="title">Título</label>
        <input 
            type="text" 
            id="title" 
            name="title" 
            placeholder="Ex: Salário, Mercado, Internet"
            required
        >

        <label for="amount">Valor</label>
        <input 
            type="number" 
            step="0.01" 
            min="0.01"
            id="amount" 
            name="amount" 
            placeholder="Ex: 150.00"
            required
        >

        <label for="type">Tipo</label>
        <select id="type" name="type" required>
            <option value="">Selecione</option>
            <option value="receita">Receita</option>
            <option value="despesa">Despesa</option>
        </select>

        <label for="category">Categoria</label>
        <select id="category" name="category" required>
            <option value="">Selecione uma categoria</option>
            <option value="Alimentação">Alimentação</option>
            <option value="Transporte">Transporte</option>
            <option value="Moradia">Moradia</option>
            <option value="Saúde">Saúde</option>
            <option value="Educação">Educação</option>
            <option value="Lazer">Lazer</option>
            <option value="Salário">Salário</option>
            <option value="Freelance">Freelance</option>
            <option value="Outros">Outros</option>
        </select>

        <label for="recurrence">Recorrência</label>
        <select id="recurrence" name="recurrence" required>
            <option value="">Selecione</option>
            <option value="unique">Única</option>
            <option value="monthly">Mensal</option>
        </select>

        <label for="date">Data</label>
        <input 
            type="date" 
            id="date" 
            name="date"
            required
        >

        <label for="description">Descrição</label>
        <textarea 
            id="description" 
            name="description" 
            rows="4" 
            placeholder="Observação opcional"
        ></textarea>

        <div class="form-actions">
            <button type="submit" class="btn">Salvar transação</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</section>
{% endblock %}
